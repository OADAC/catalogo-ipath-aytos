<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>iPath · Comprobación del Release</title>
<style>
:root{font-family:Inter,system-ui,sans-serif;color:#13282b;background:#f4f7f6}*{box-sizing:border-box}body{margin:0;padding:32px}.wrap{max-width:920px;margin:auto}.card{background:#fff;border:1px solid #d9e2df;border-radius:18px;padding:24px;box-shadow:0 16px 40px rgba(22,55,58,.08)}h1{margin:0 0 8px;font-size:28px}p{color:#587075;line-height:1.6}.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}.meta div{background:#f0f5f3;border-radius:12px;padding:14px}.meta small{display:block;color:#6a7d80}.meta b{display:block;margin-top:5px;overflow-wrap:anywhere}.status{padding:14px;border-radius:12px;background:#eef5ff;color:#254f7f}.status.ok{background:#e9f8f2;color:#116648}.status.bad{background:#fff0f0;color:#9c2b2b}.list{margin-top:16px;display:grid;gap:6px}.item{padding:10px 12px;border:1px solid #e0e7e5;border-radius:9px;background:#fbfcfc;overflow-wrap:anywhere}.item.bad{border-color:#efbcbc;background:#fff5f5}@media(max-width:680px){body{padding:14px}.meta{grid-template-columns:1fr}}
</style>
<script src="release-config.js"></script>
</head>
<body>
<div class="wrap"><div class="card">
<h1>Comprobación del Release iPath</h1>
<p>Verifica que el Release sea público, esté publicado y contenga todos los archivos planos con el nombre exacto mostrado en el Release.</p>
<div class="meta"><div><small>Propietario</small><b id="owner">—</b></div><div><small>Repositorio</small><b id="repo">—</b></div><div><small>Tag</small><b id="tag">—</b></div></div>
<div class="status" id="status">Comprobando…</div><div class="list" id="list"></div>
</div></div>
<script>
(async()=>{
 const cfg=window.IPATH_RELEASE||{};
 let owner=(cfg.owner||'').trim(),repo=(cfg.repository||'').trim();
 if((!owner||!repo)&&/\.github\.io$/i.test(location.hostname)){
   owner=owner||location.hostname.split('.')[0];
   const parts=location.pathname.split('/').filter(Boolean);
   repo=repo||(parts[0]||`${owner}.github.io`);
 }
 const tag=cfg.tag||'catalogoipath';
 ownerEl=document.getElementById('owner');repoEl=document.getElementById('repo');tagEl=document.getElementById('tag');
 ownerEl.textContent=owner||'No detectado';repoEl.textContent=repo||'No detectado';tagEl.textContent=tag;
 const status=document.getElementById('status'),list=document.getElementById('list');
 if(!owner||!repo){status.textContent='No se pudo determinar el repositorio. Rellena owner y repository en release-config.js.';status.className='status bad';return}
 try{
   const [releaseResponse,manifestResponse]=await Promise.all([
     fetch(`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/releases/tags/${encodeURIComponent(tag)}`,{headers:{Accept:'application/vnd.github+json'}}),
     fetch('release-assets-manifest.json',{cache:'no-store'})
   ]);
   if(!releaseResponse.ok)throw new Error(`GitHub respondió ${releaseResponse.status}. El repositorio puede ser privado o el Release/tag no existe.`);
   const release=await releaseResponse.json(),manifest=await manifestResponse.json();
   const actual=new Set((release.assets||[]).map(a=>a.name.normalize('NFC')));
   const missing=(manifest.assets||[]).filter(name=>!actual.has(name.normalize('NFC')));
   if(!missing.length){status.textContent=`Correcto: ${actual.size} adjuntos disponibles y todos los ${manifest.assets.length} recursos esperados localizados.`;status.className='status ok';return}
   status.textContent=`Faltan ${missing.length} recursos del manifiesto.`;status.className='status bad';
   list.innerHTML=missing.map(name=>`<div class="item bad">${name.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>`).join('');
 }catch(error){status.textContent=error.message||'No se pudo comprobar el Release.';status.className='status bad'}
})();
</script>
</body></html>
